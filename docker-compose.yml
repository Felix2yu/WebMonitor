name: webmonitor
services:
  webmonitor:
    image: ghcr.io/felix2yu/webmonitor:latest
    container_name: webmonitor
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:///./data/webmonitor.db
      SECRET_KEY: ${SECRET_KEY:-your-very-secure-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      DEFAULT_CHECK_INTERVAL: 300
      MAX_CHECK_INTERVAL: 86400
      MIN_CHECK_INTERVAL: 10
      SELENIUM_HEADLESS: "true"
      SELENIUM_TIMEOUT: 30
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:8000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@webmonitor.com}
      APPRISE_URLS: ${APPRISE_URLS:-}
    ports:
      - "8000:8000"
    volumes:
      - webmonitor-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  webmonitor-data:
