<!DOCTYPE html>
<html lang="zh-CN" style="background-color: #f8fafc;">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
  <link rel="alternate icon" href="%PUBLIC_URL%/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0F172A" />
  <meta name="description" content="WebMonitor - 网页内容监控通知系统" />
  <title>WebMonitor - 网页监控</title>


  <!-- Custom styles for dark mode scrollbar -->
  <style>
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #1e293b;
    }
    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    /* Loading animation */
    #root {
      min-height: 100vh;
    }
  </style>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script>
    // Prevent flash of light background in dark mode during page load/navigation
    (function() {
      try {
        var stored = localStorage.getItem('webmonitor-theme') || 'system';
        var isDark = stored === 'dark' ||
          (stored === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var bg = isDark ? '#0f172a' : '#f8fafc';
        document.documentElement.style.backgroundColor = bg;
        document.body.style.backgroundColor = bg;
      } catch (e) {}
    })();
  </script>
</body>

</html>
